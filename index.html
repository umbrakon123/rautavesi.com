<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rautavesi.com</title>
  <style>
    :root {
      --bg: #070707;
      --panel: #0d0c0b;
      --text: #e7dece;
      --muted: #8a7d6d;
      --line: rgba(231, 222, 206, 0.10);
      --line-soft: rgba(231, 222, 206, 0.045);
      --gold: #a88449;
      --gold-soft: rgba(168, 132, 73, 0.12);
      --shadow: rgba(0, 0, 0, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 14%, rgba(168, 132, 73, 0.035), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.015), transparent 34%),
        linear-gradient(to bottom, #090807, #060606 68%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .frame {
      position: relative;
      width: min(940px, 100%);
      min-height: 660px;
      padding: 52px 48px 40px;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.008), rgba(255,255,255,0.002)),
        linear-gradient(to bottom right, rgba(168,132,73,0.015), transparent 35%),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.012) inset,
        0 40px 120px var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid var(--line-soft);
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 58%, rgba(0,0,0,0.14) 100%);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      opacity: 0.9;
    }

    .corner::before,
    .corner::after {
      content: "";
      position: absolute;
      background: rgba(168, 132, 73, 0.34);
    }

    .corner::before {
      width: 26px;
      height: 1px;
    }

    .corner::after {
      width: 1px;
      height: 26px;
    }

    .corner.tl { top: 14px; left: 14px; }
    .corner.tl::before, .corner.tl::after { top: 0; left: 0; }

    .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .corner.tr::before, .corner.tr::after { top: 0; left: 0; }

    .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .corner.bl::before, .corner.bl::after { top: 0; left: 0; }

    .corner.br { bottom: 14px; right: 14px; transform: scale(-1); }
    .corner.br::before, .corner.br::after { top: 0; left: 0; }

    .ornament-top {
      display: flex;
      justify-content: center;
      margin-top: 2px;
      margin-bottom: 2px;
      opacity: 0.9;
    }

    .crest {
      width: 180px;
      height: 104px;
      filter: drop-shadow(0 0 10px rgba(168, 132, 73, 0.06));
    }

    .crest path,
    .crest ellipse,
    .crest line,
    .crest circle {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .crest .gold {
      stroke: rgba(168, 132, 73, 0.82);
      stroke-width: 1.05;
    }

    .crest .soft {
      stroke: rgba(231, 222, 206, 0.22);
      stroke-width: 0.95;
    }

    .crest .fine {
      stroke: rgba(231, 222, 206, 0.13);
      stroke-width: 0.85;
    }

    .content {
      min-height: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 1;
      margin-top: -8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.45rem);
      font-weight: 500;
      letter-spacing: 0.11em;
      text-transform: lowercase;
      color: var(--text);
    }

    .rule {
      width: 116px;
      height: 18px;
      margin: 14px 0 18px;
      position: relative;
      opacity: 0.88;
    }

    .rule::before,
    .rule::after {
      content: "";
      position: absolute;
      top: 8px;
      width: 48px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(168, 132, 73, 0.8));
    }

    .rule::before {
      left: 0;
    }

    .rule::after {
      right: 0;
      transform: scaleX(-1);
    }

    .rule span {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      color: rgba(168, 132, 73, 0.88);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    .lead {
      margin: 0;
      font-size: clamp(1.02rem, 1.55vw, 1.2rem);
      line-height: 1.8;
      color: var(--text);
    }

    .lead span {
      display: block;
    }

    .footer {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 24px;
      text-align: center;
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.8;
    }

    @media (max-width: 640px) {
      .frame {
        min-height: auto;
        padding: 38px 22px 72px;
      }

      .frame::before {
        inset: 10px;
      }

      .crest {
        width: 148px;
        height: 86px;
      }

      .content {
        margin-top: -4px;
      }

      .footer {
        left: 18px;
        right: 18px;
        bottom: 18px;
        font-size: 0.71rem;
        letter-spacing: 0.11em;
      }
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="Private domain placeholder">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="ornament-top" aria-hidden="true">
      <svg class="crest" viewBox="0 0 220 120" role="img">
        <!-- outer composition -->
        <line class="fine" x1="24" y1="56" x2="72" y2="56" />
        <line class="fine" x1="148" y1="56" x2="196" y2="56" />

        <!-- small laurel-like curves -->
        <path class="fine" d="M74 48 C64 52, 58 60, 58 70 C58 79, 63 87, 71 92" />
        <path class="fine" d="M146 48 C156 52, 162 60, 162 70 C162 79, 157 87, 149 92" />

        <!-- main seal -->
        <ellipse class="soft" cx="110" cy="56" rx="38" ry="26" />
        <ellipse class="fine" cx="110" cy="56" rx="50" ry="35" />

        <!-- heraldic shield -->
        <path class="soft" d="M110 36
                              C118 41, 127 43, 135 44
                              C132 56, 130 66, 130 74
                              C130 87, 123 96, 110 101
                              C97 96, 90 87, 90 74
                              C90 66, 88 56, 85 44
                              C93 43, 102 41, 110 36 Z" />

        <!-- subtle center emblem -->
        <path class="gold" d="M110 47 L115 57 L126 58 L118 65 L120 76 L110 70 L100 76 L102 65 L94 58 L105 57 Z" />
        <circle class="gold" cx="110" cy="61" r="3.5" />

        <!-- lower flourish -->
        <path class="fine" d="M96 98 C100 102, 105 104, 110 104 C115 104, 120 102, 124 98" />
      </svg>
    </div>

    <section class="content">
      <h1>rautavesi.com</h1>

      <div class="rule" aria-hidden="true">
        <span>✦</span>
      </div>

      <p class="lead">
        <span>No public presence.</span>
        <span>Reserved for private correspondence.</span>
      </p>
    </section>

    <div class="footer">private archive · 2026</div>
  </main>
</body>
</html>
